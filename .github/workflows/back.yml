name: Backend CI

on:
  push:
    branches: [back]
    paths:
      - 'services/**'
      - 'internal/**'
      - 'db/**'
      - 'go.mod'
      - 'go.sum'
      - 'docker-compose.yml'
      - '.github/workflows/back.yml'
  pull_request:
    branches: [back]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go mod download
      - run: go test -count=1 ./...
      - run: docker compose config -q
