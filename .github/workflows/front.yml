name: Frontend CI

on:
  push:
    branches: [front]
    paths:
      - 'frontend/**'
      - '.github/workflows/front.yml'
  pull_request:
    branches: [front]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NUXT_PUBLIC_DEMO_MODE: 'true'
